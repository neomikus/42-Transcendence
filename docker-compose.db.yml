version: '3.8'

# Servicio independiente solo para PostgreSQL
# Se levanta una vez y queda corriendo, los datos persisten siempre

services:
  postgres:
    image: postgres:16-alpine
    container_name: transcendence-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=transcendence
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - transcendence-network

  adminer:
    image: adminer:latest
    container_name: transcendence-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    restart: unless-stopped
    networks:
      - transcendence-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  transcendence-network:
    name: transcendence-network
